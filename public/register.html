<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrarse — Daxos</title>
  <link rel="stylesheet" href="/auth.css" />
</head>
<body>
  <div class="card">
    <div class="logo">Daxos</div>
    <h1>Crear cuenta</h1>
    <p class="subtitle">Ingresá tu email y una contraseña para empezar.</p>

    <form id="form">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="tu@email.com" autocomplete="email" required />
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input id="password" type="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required />
      </div>
      <button type="submit" id="btn">Crear cuenta</button>
      <div class="error" id="error"></div>
    </form>

    <p class="footer-link">¿Ya tenés cuenta? <a href="/login.html">Iniciá sesión</a></p>
  </div>

  <script>
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const errorEl = document.getElementById('error');
      errorEl.classList.remove('visible');
      btn.disabled = true;
      btn.textContent = 'Creando cuenta...';

      const res = await fetch('/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value,
        }),
      });

      const data = await res.json();
      if (res.ok) {
        window.location.href = '/dashboard.html';
      } else {
        errorEl.textContent = data.error;
        errorEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Crear cuenta';
      }
    });
  </script>
</body>
</html>
